<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ehRadio Remote</title>
<meta name="theme-color" content="#0D1B12" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pcb-green:#0D1B12;
    --pcb-green-2:#132A1C;
    --amber:#FFB000;
    --copper:#B87333;
    --off-white:#E8E4D9;
    --moss:#4A6741;
    --danger:#C4462B;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 50% -10%, #1a3324 0%, var(--pcb-green) 55%),
      var(--pcb-green);
    color:var(--off-white);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    overscroll-behavior:none;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:.03em; }

  /* ===== شريط الحالة العلوي (مستوحى من شاشة OLED صغيرة) ===== */
  .status-strip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:14px 16px calc(10px + env(safe-area-inset-top,0px));
    padding-top:calc(14px + env(safe-area-inset-top,0px));
    background:linear-gradient(180deg, #0a150e, var(--pcb-green-2));
    border-bottom:1px solid rgba(255,176,0,.18);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .dial{
    width:26px;height:26px;border-radius:50%;
    border:2px solid var(--amber);
    position:relative;
    flex:none;
  }
  .dial::after{
    content:"";
    position:absolute; inset:0;
    margin:auto;
    width:3px;height:3px;border-radius:50%;
    background:var(--copper);
    box-shadow:0 0 6px var(--copper);
  }
  .brand-text{ font-size:14px; font-weight:600; letter-spacing:.06em; }
  .brand-text small{ display:block; font-size:10px; color:var(--moss); font-weight:500; }

  .vu{ display:flex; align-items:flex-end; gap:3px; height:18px; }
  .vu span{
    width:3px; background:var(--amber); opacity:.35;
    animation:none;
    border-radius:1px;
  }
  body.connected .vu span{ animation:vu 1.1s ease-in-out infinite; opacity:1; }
  body.unreachable .dial{ border-color:var(--danger); }
  body.unreachable .dial::after{ background:var(--danger); box-shadow:0 0 6px var(--danger); }
  body.unreachable .vu span{ background:var(--danger); opacity:.5; animation:none; }
  body.unreachable #ipLabel{ color:var(--danger); }
  .vu span:nth-child(1){ height:40%; animation-delay:.0s; }
  .vu span:nth-child(2){ height:80%; animation-delay:.12s; }
  .vu span:nth-child(3){ height:55%; animation-delay:.24s; }
  .vu span:nth-child(4){ height:95%; animation-delay:.36s; }
  .vu span:nth-child(5){ height:65%; animation-delay:.48s; }
  @keyframes vu{
    0%,100%{ transform:scaleY(.35); }
    50%{ transform:scaleY(1); }
  }

  .gear-btn{
    background:transparent; border:1px solid rgba(232,228,217,.25);
    color:var(--off-white); width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; cursor:pointer; flex:none;
  }
  .gear-btn:active{ background:rgba(255,176,0,.12); }

  /* ===== شاشة الإعداد الأولى ===== */
  #setup{
    flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:28px 22px; gap:18px;
    max-width:460px; margin:0 auto; width:100%;
  }
  #setup h1{
    font-size:22px; margin:0 0 4px; font-weight:700;
  }
  #setup p.hint{
    margin:0; color:#9fb3a5; font-size:13.5px; line-height:1.7;
  }
  .field label{
    display:block; font-size:12px; color:var(--amber); margin-bottom:6px;
    font-weight:600;
  }
  .field input{
    width:100%; padding:13px 14px; border-radius:var(--radius);
    border:1px solid rgba(255,176,0,.3); background:var(--pcb-green-2);
    color:var(--off-white); font-size:16px; font-family:'IBM Plex Mono', monospace;
    direction:ltr; text-align:left;
  }
  .field input:focus{ outline:none; border-color:var(--amber); }
  .btn-primary{
    padding:14px; border-radius:var(--radius); border:none;
    background:var(--amber); color:#1a1204; font-weight:700; font-size:15px;
    cursor:pointer;
  }
  .btn-primary:active{ transform:translateY(1px); }
  .btn-ghost{
    padding:12px; border-radius:var(--radius); border:1px solid rgba(232,228,217,.25);
    background:transparent; color:var(--off-white); font-size:13.5px; cursor:pointer;
  }
  .presets{ display:flex; gap:8px; flex-wrap:wrap; }
  .preset-chip{
    padding:7px 12px; border-radius:999px; font-size:12px;
    border:1px solid rgba(184,115,51,.5); color:var(--copper);
    background:transparent; cursor:pointer; font-family:'IBM Plex Mono', monospace;
  }

  /* ===== الشاشة الرئيسية: إطار يحتضن واجهة الراديو الفعلية ===== */
  #main{ flex:1; display:none; flex-direction:column; min-height:0; }
  #main.active{ display:flex; }

  .faceplate{
    flex:1; margin:12px; margin-top:14px; border-radius:18px;
    border:1px solid rgba(255,176,0,.22);
    background:#081109;
    box-shadow: inset 0 0 0 6px #0a150e, inset 0 0 30px rgba(0,0,0,.5);
    overflow:hidden; position:relative; min-height:0;
    display:flex; flex-direction:column;
  }
  .webui-frame{
    flex:1; width:100%; border:none; background:#fff;
  }
  .state-msg{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; padding:24px; text-align:center; color:#9fb3a5; font-size:13px;
  }

  .bottom-bar{
    display:flex; gap:10px; padding:0 16px calc(14px + env(safe-area-inset-bottom,0px));
  }
  .bottom-bar button{
    flex:1; min-height:48px; padding:12px; border-radius:var(--radius);
    background:var(--pcb-green-2); color:var(--off-white);
    border:1px solid rgba(232,228,217,.15); font-size:13.5px; cursor:pointer;
  }
  .bottom-bar button:active{ background:rgba(255,176,0,.12); border-color:rgba(255,176,0,.3); }

  ::selection{ background:var(--amber); color:#1a1204; }
</style>
</head>
<body>

  <div class="status-strip">
    <div class="brand">
      <div class="dial"></div>
      <div class="brand-text mono">EHRADIO REMOTE<small id="ipLabel">غير متصل</small></div>
    </div>
    <div class="vu" id="vu">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <button class="gear-btn" id="settingsBtn" title="الإعدادات" aria-label="الإعدادات">⚙</button>
  </div>

  <!-- شاشة الإعداد -->
  <section id="setup">
    <h1>وصّل جهاز الراديو</h1>
    <p class="hint">أدخل عنوان IP الخاص بجهاز ehRadio على شبكتك المحلية. تقدر تجده من إعدادات الراوتر أو من شاشة الجهاز نفسه.</p>
    <div class="field">
      <label for="ipInput">عنوان IP</label>
      <input id="ipInput" type="text" inputmode="decimal" placeholder="192.168.1.50" autocomplete="off" />
    </div>
    <button class="btn-primary" id="connectBtn">اتصال</button>
    <p class="hint" style="margin-top:-8px;">سيُحفظ العنوان على هذا الجهاز فقط، ويمكنك تغييره لاحقًا من زر ⚙ أعلى الشاشة.</p>
  </section>

  <!-- الشاشة الرئيسية -->
  <section id="main">
    <div class="faceplate">
      <div id="frameHolder" style="flex:1; display:flex; min-height:0;">
        <iframe class="webui-frame" id="webuiFrame" title="ehRadio WebUI"></iframe>
      </div>
    </div>
    <div class="bottom-bar">
      <button id="reloadBtn">⟳ تحديث</button>
      <button id="openTabBtn">↗ فتح في تبويب</button>
      <button id="forgetBtn">تغيير الجهاز</button>
    </div>
  </section>

<script>
  const STORAGE_KEY = "ehradio_remote_ip";
  const setupEl = document.getElementById("setup");
  const mainEl = document.getElementById("main");
  const ipInput = document.getElementById("ipInput");
  const ipLabel = document.getElementById("ipLabel");
  const frame = document.getElementById("webuiFrame");
  const frameHolder = document.getElementById("frameHolder");

  function normalizeUrl(raw){
    let v = raw.trim();
    if(!v) return null;
    if(!/^https?:\/\//i.test(v)) v = "http://" + v;
    try{ new URL(v); return v; } catch(e){ return null; }
  }

  function showMain(url){
    setupEl.style.display = "none";
    mainEl.classList.add("active");
    document.body.classList.add("connected");
    const host = new URL(url).host;
    ipLabel.textContent = "متصل بـ " + host;
    loadFrame(url);
    startHealthCheck(url);
  }

  function loadFrame(url){
    frameHolder.innerHTML = "";
    const f = document.createElement("iframe");
    f.className = "webui-frame";
    f.id = "webuiFrame";
    f.title = "ehRadio WebUI";
    f.src = url;
    f.onerror = showConnError;
    frameHolder.appendChild(f);
  }

  function showConnError(){
    frameHolder.innerHTML =
      '<div class="state-msg"><div>⚠ تعذّر الوصول للجهاز</div>' +
      '<div>تأكد إنك متصل بنفس الشبكة المحلية للراديو، ثم اضغط تحديث.</div></div>';
  }

  function showSetup(){
    mainEl.classList.remove("active");
    document.body.classList.remove("connected", "unreachable");
    setupEl.style.display = "flex";
    stopHealthCheck();
  }

  document.getElementById("connectBtn").addEventListener("click", () => {
    const url = normalizeUrl(ipInput.value);
    if(!url){ ipInput.style.borderColor = "var(--danger)"; return; }
    localStorage.setItem(STORAGE_KEY, url);
    showMain(url);
  });

  ipInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter") document.getElementById("connectBtn").click();
  });

  document.getElementById("settingsBtn").addEventListener("click", () => {
    const saved = localStorage.getItem(STORAGE_KEY) || "";
    ipInput.value = saved.replace(/^https?:\/\//i, "");
    showSetup();
  });

  document.getElementById("forgetBtn").addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    ipInput.value = "";
    showSetup();
  });

  document.getElementById("reloadBtn").addEventListener("click", () => {
    const url = localStorage.getItem(STORAGE_KEY);
    if(url) loadFrame(url);
  });

  document.getElementById("openTabBtn").addEventListener("click", () => {
    const url = localStorage.getItem(STORAGE_KEY);
    if(url) window.open(url, "_blank");
  });

  // ===== فحص اتصال دوري حقيقي بالراديو =====
  let healthTimer = null;

  async function checkHealth(url){
    try{
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 4000);
      // وضع no-cors: لا نقرأ الرد (السيرفر على شبكة محلية غالبًا لا يدعم CORS)،
      // لكن رفض الوعد (reject) يعني فعليًا أن الجهاز غير قابل للوصول.
      await fetch(url, { mode: "no-cors", cache: "no-store", signal: ctrl.signal });
      clearTimeout(t);
      setReachable(true);
    }catch(e){
      setReachable(false);
    }
  }

  function setReachable(ok){
    const host = (localStorage.getItem(STORAGE_KEY) || "").replace(/^https?:\/\//i, "");
    if(ok){
      document.body.classList.remove("unreachable");
      ipLabel.textContent = "متصل بـ " + host;
    }else{
      document.body.classList.add("unreachable");
      ipLabel.textContent = "لا يستجيب: " + host;
    }
  }

  function startHealthCheck(url){
    stopHealthCheck();
    checkHealth(url);
    healthTimer = setInterval(() => checkHealth(url), 8000);
  }

  function stopHealthCheck(){
    if(healthTimer){ clearInterval(healthTimer); healthTimer = null; }
  }

  // بدء التشغيل
  (function init(){
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) showMain(saved);
    else showSetup();
  })();

  // تسجيل service worker (يتطلب استضافة عبر http(s) وليس file://)
  if("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
